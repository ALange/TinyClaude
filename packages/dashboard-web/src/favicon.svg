<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Near-black square background with hairline gray stroke -->
  <rect x="0" y="0" width="100" height="100" fill="#1a1a1a" stroke="#666" stroke-width="0.5"/>
  <!-- Lowercase monospace "tc" mark centered -->
  <text x="50" y="62" font-family="monospace" font-size="44" font-weight="bold" text-anchor="middle" fill="white">tc</text>
  <!-- Plus corner marks -->
  <!-- Top-left -->
  <line x1="8" y1="5" x2="8" y2="11" stroke="#666" stroke-width="1"/>
  <line x1="5" y1="8" x2="11" y2="8" stroke="#666" stroke-width="1"/>
  <!-- Top-right -->
  <line x1="92" y1="5" x2="92" y2="11" stroke="#666" stroke-width="1"/>
  <line x1="89" y1="8" x2="95" y2="8" stroke="#666" stroke-width="1"/>
  <!-- Bottom-left -->
  <line x1="8" y1="89" x2="8" y2="95" stroke="#666" stroke-width="1"/>
  <line x1="5" y1="92" x2="11" y2="92" stroke="#666" stroke-width="1"/>
  <!-- Bottom-right -->
  <line x1="92" y1="89" x2="92" y2="95" stroke="#666" stroke-width="1"/>
  <line x1="89" y1="92" x2="95" y2="92" stroke="#666" stroke-width="1"/>
</svg>