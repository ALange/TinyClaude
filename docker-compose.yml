services:
  tinyclaude:
    image: ghcr.io/alange/tinyclaude:latest
    container_name: tinyclaude
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # Persist database
      - tinyclaude-data:/data
      # Optional: mount custom config
      # - ./config:/app/config:ro
    environment:
      - NODE_ENV=production
      - TINYCLAUDE_DB_PATH=/data/tinyclaude.db
      - XDG_CONFIG_HOME=/data
      # Optional: configure logging
      # - LOG_LEVEL=info
      # Optional: expose per-account detail on /health?detail=1 (default: off)
      # - HEALTH_DETAIL_ENABLED=false
    # Load environment variables from .env file (optional)
    # Create a .env file in the same directory as docker-compose.yml
    env_file:
      - .env  # Optional: load from .env file
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Resource limits (adjust as needed)
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

volumes:
  tinyclaude-data:
    driver: local
